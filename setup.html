<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Admin Setup — Run Once</title>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config-prod.js"></script>
  <style>
    body { font-family: sans-serif; max-width: 480px; margin: 60px auto; padding: 24px; background: #f5f3ee; }
    h2 { color: #1a3a5c; margin-bottom: 8px; }
    p { color: #666; font-size: 14px; margin-bottom: 24px; }
    label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 4px; }
    input { width: 100%; padding: 12px; border: 1.5px solid #ddd; border-radius: 8px; font-size: 15px; margin-bottom: 16px; box-sizing: border-box; }
    button { background: #1a3a5c; color: #fff; border: none; padding: 14px 28px; border-radius: 8px; font-size: 15px; font-weight: 700; cursor: pointer; width: 100%; }
    button:hover { background: #2a5298; }
    .msg { margin-top: 16px; padding: 12px 16px; border-radius: 8px; font-size: 14px; }
    .success { background: #d1fae5; color: #065f46; }
    .error { background: #fee2e2; color: #991b1b; }
    .warning { background: #fef3c7; color: #92400e; font-size: 13px; margin-bottom: 20px; padding: 12px; border-radius: 8px; border: 1px solid #fcd34d; }
  </style>
</head>
<body>
  <h2>⚙️ Admin Setup</h2>
  <div class="warning">
    ⚠️ <strong>Run this page only once</strong> to create your admin credentials in Firestore.
    Delete this file after setup is complete.
  </div>
  <p>Set the username and password for the admin account. These will be stored in Firestore — not in your code.</p>

  <label>Admin Username</label>
  <input type="text" id="username" placeholder="e.g. your phone number or name"/>

  <label>Admin Password</label>
  <input type="password" id="password" placeholder="Choose a strong password"/>

  <label>Confirm Password</label>
  <input type="password" id="confirm" placeholder="Repeat password"/>

  <button onclick="setupAdmin()">Create Admin Account</button>
  <div id="msg"></div>

<script>
async function setupAdmin() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const confirm = document.getElementById('confirm').value;
  const msg = document.getElementById('msg');

  if (!username || !password) { msg.className = 'msg error'; msg.textContent = 'Please fill in all fields.'; return; }
  if (password !== confirm) { msg.className = 'msg error'; msg.textContent = 'Passwords do not match.'; return; }
  if (password.length < 8) { msg.className = 'msg error'; msg.textContent = 'Password must be at least 8 characters.'; return; }

  try {
    // Check if admin already exists
    const existing = await db.collection('admins').doc('main').get();
    if (existing.exists) {
      msg.className = 'msg error';
      msg.textContent = '❌ Admin already exists. Delete the Firestore admins/main document first to reset.';
      return;
    }

    await db.collection('admins').doc('main').set({
      username: username,
      password: password,
      createdAt: new Date().toISOString()
    });

    msg.className = 'msg success';
    msg.textContent = '✅ Admin account created! You can now login at admin-login.html. Delete this setup file.';
  } catch (err) {
    msg.className = 'msg error';
    msg.textContent = '❌ Error: ' + err.message;
  }
}
</script>
</body>
</html>
