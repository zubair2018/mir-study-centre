<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — Mir's Study Space</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>

<nav class="navbar scrolled" id="navbar">
  <div class="nav-container">
    <a href="index.html" class="nav-logo">
      <div class="logo-icon">M</div>
      <div>
        <span class="logo-title">Mir's Study Space</span>
        <span class="logo-sub">Centre of Excellence</span>
      </div>
    </a>
    <ul class="nav-links" id="navLinks">
      <li><a href="index.html">← Back to Home</a></li>
      <li><a href="student-login.html" class="nav-login"><i class="fas fa-user"></i> Student Login</a></li>
    </ul>
    <button class="hamburger" id="hamburger"><i class="fas fa-bars"></i></button>
  </div>
</nav>

<div class="form-page" style="background: linear-gradient(135deg, #f5f3ee 0%, #e8f4f8 100%);">
  <div class="form-card">
    <div class="form-logo">
      <div class="logo-icon">M</div>
      <h1>Student Registration</h1>
      <p>Join Mir's Study Space — Sangam's Centre of Excellence</p>
    </div>

    <!-- PROGRESS STEPS -->
    <div class="reg-steps" id="regSteps">
      <div class="step active" data-step="1"><span>1</span> Registration Details</div>
    </div>

    <form id="registerForm">
      <!-- STEP 1 -->
      <div class="reg-step-content active" id="step1">
        <div class="form-group">
          <label>Full Name *</label>
          <input type="text" id="fullName" placeholder="Enter your full name" required/>
        </div>
        <div class="form-group">
          <label>Father's Name *</label>
          <input type="text" id="fatherName" placeholder="Father's full name" required/>
        </div>
        <div class="form-group">
          <label>Address *</label>
          <input type="text" id="address" placeholder="Village / Mohalla, Town" required/>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Phone Number *</label>
            <input type="tel" id="phone" placeholder="10-digit number" required/>
          </div>
          <div class="form-group">
            <label>Parent Phone Number *</label>
            <input type="tel" id="parentPhone" placeholder="10-digit number" required/>
          </div>
        </div>
        <div class="form-group">
          <label>Email *</label>
          <input type="email" id="email" placeholder="your.email@example.com" required/>
        </div>
        <div class="form-group">
          <label>Purpose of Study *</label>
          <select id="purpose" required>
            <option value="">Select Purpose</option>
            <option>Board Exams (10th/12th)</option>
            <option>Competitive Exams (JEE/NEET)</option>
            <option>Skill Development</option>
            <option>Tuition Support</option>
            <option>Other</option>
          </select>
        </div>
        <button type="submit" class="btn-primary btn-full"><i class="fas fa-check"></i> Submit Registration</button>
      </div>
    </form>

    <div class="form-link">Already have an account? <a href="student-login.html">Login here</a></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<style>
.reg-steps {
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 32px; gap: 0;
}
.step {
  display: flex; align-items: center; gap: 8px;
  font-size: 13px; font-weight: 600; color: var(--text-light);
  transition: all 0.3s;
}
.step span {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--primary); color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700;
}
.step.active { color: var(--primary); }

.reg-step-content { display: none; }
.reg-step-content.active { display: block; animation: slideUp 0.4s ease both; }
</style>

<script src="js/main.js"></script>
<script>
let currentStep = 1;

function nextStep(step) {
  if (!validateStep(currentStep)) return;
  document.getElementById('step' + currentStep).classList.remove('active');
  document.querySelectorAll('.step')[currentStep - 1].classList.add('done');
  document.querySelectorAll('.step')[currentStep - 1].classList.remove('active');
  currentStep = step;
  document.getElementById('step' + currentStep).classList.add('active');
  document.querySelectorAll('.step')[currentStep - 1].classList.add('active');
}

function prevStep(step) {
  document.getElementById('step' + currentStep).classList.remove('active');
  currentStep = step;
  document.getElementById('step' + currentStep).classList.add('active');
  document.querySelectorAll('.step')[currentStep].classList.remove('active', 'done');
}

function validateStep(step) {
  if (step === 1) {
    if (!document.getElementById('fullName').value.trim()) { showToast('Please enter full name', 'error'); return false; }
    if (!document.getElementById('fatherName').value.trim()) { showToast("Please enter father's name", 'error'); return false; }
    if (!document.getElementById('address').value.trim()) { showToast('Please enter address', 'error'); return false; }
    if (!document.getElementById('phone').value.trim()) { showToast('Please enter phone number', 'error'); return false; }
    if (!document.getElementById('parentPhone').value.trim()) { showToast('Please enter parent phone number', 'error'); return false; }
    if (!document.getElementById('email').value.trim()) { showToast('Please enter email', 'error'); return false; }
    if (!document.getElementById('purpose').value) { showToast('Please select purpose of study', 'error'); return false; }
  }
  return true;
}

document.getElementById('registerForm').addEventListener('submit', (e) => {
  e.preventDefault();
  if (!validateStep(1)) return;

  const phone = document.getElementById('phone').value;
  if (!/^\d{10}$/.test(phone)) { showToast('Enter valid 10-digit phone number', 'error'); return; }

  const parentPhone = document.getElementById('parentPhone').value;
  if (!/^\d{10}$/.test(parentPhone)) { showToast('Enter valid 10-digit parent phone number', 'error'); return; }

  const email = document.getElementById('email').value;
  const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  if (!emailRegex.test(email)) { showToast('Enter valid email address', 'error'); return; }

  // Build student object
  const student = {
    id: 'MSS' + Date.now(),
    fullName: document.getElementById('fullName').value.trim(),
    fatherName: document.getElementById('fatherName').value.trim(),
    address: document.getElementById('address').value.trim(),
    phone: phone,
    parentPhone: parentPhone,
    email: email,
    purpose: document.getElementById('purpose').value,
    joinDate: new Date().toISOString().split('T')[0],
    feeStatus: 'Pending',
    feePaid: 0,
    feeHistory: [],
    status: 'Active'
  };

  // Save to localStorage
  const students = JSON.parse(localStorage.getItem('mss_students') || '[]');
  const exists = students.find(s => s.phone === phone || s.email === email);
  if (exists) { showToast('A student with this phone number or email already exists.', 'error'); return; }
  students.push(student);
  localStorage.setItem('mss_students', JSON.stringify(students));

  showToast('🎉 Registration Successful! Your ID: ' + student.id);
  setTimeout(() => { window.location.href = 'student-login.html'; }, 2500);
});
</script>
</body>
</html>
