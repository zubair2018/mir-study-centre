<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — Mir's Study Space</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>

<nav class="navbar scrolled" id="navbar">
  <div class="nav-container">
    <a href="index.html" class="nav-logo">
      <div class="logo-icon">M</div>
      <div>
        <span class="logo-title">Mir's Study Space</span>
        <span class="logo-sub">Centre of Excellence</span>
      </div>
    </a>
    <ul class="nav-links" id="navLinks">
      <li><a href="index.html">← Back to Home</a></li>
      <li><a href="student-login.html" class="nav-login"><i class="fas fa-user"></i> Student Login</a></li>
    </ul>
    <button class="hamburger" id="hamburger"><i class="fas fa-bars"></i></button>
  </div>
</nav>

<div class="form-page" style="background: linear-gradient(135deg, #f5f3ee 0%, #e8f4f8 100%);">
  <div class="form-card">
    <div class="form-logo">
      <div class="logo-icon">M</div>
      <h1>Student Registration</h1>
      <p>Join Mir's Study Space — Sangam's Centre of Excellence</p>
    </div>

    <!-- PROGRESS STEPS -->
    <div class="reg-steps" id="regSteps">
      <div class="step active" data-step="1"><span>1</span> Personal Info</div>
      <div class="step-line"></div>
      <div class="step" data-step="2"><span>2</span> Academic Info</div>
      <div class="step-line"></div>
      <div class="step" data-step="3"><span>3</span> Contact & Fee</div>
    </div>

    <form id="registerForm">
      <!-- STEP 1 -->
      <div class="reg-step-content active" id="step1">
        <div class="form-group">
          <label>Full Name *</label>
          <input type="text" id="fullName" placeholder="Enter your full name" required/>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Date of Birth *</label>
            <input type="date" id="dob" required/>
          </div>
          <div class="form-group">
            <label>Gender *</label>
            <select id="gender" required>
              <option value="">Select</option>
              <option>Male</option>
              <option>Female</option>
              <option>Other</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label>Father's Name *</label>
          <input type="text" id="fatherName" placeholder="Father's full name" required/>
        </div>
        <div class="form-group">
          <label>Mother's Name</label>
          <input type="text" id="motherName" placeholder="Mother's full name"/>
        </div>
        <button type="button" class="btn-primary btn-full" onclick="nextStep(2)">Next <i class="fas fa-arrow-right"></i></button>
      </div>

      <!-- STEP 2 -->
      <div class="reg-step-content" id="step2">
        <div class="form-row">
          <div class="form-group">
            <label>Class / Grade *</label>
            <select id="studentClass" required>
              <option value="">Select Class</option>
              <option>Class 6</option><option>Class 7</option><option>Class 8</option>
              <option>Class 9</option><option>Class 10</option>
              <option>Class 11 (Science)</option><option>Class 11 (Commerce)</option><option>Class 11 (Arts)</option>
              <option>Class 12 (Science)</option><option>Class 12 (Commerce)</option><option>Class 12 (Arts)</option>
            </select>
          </div>
          <div class="form-group">
            <label>School / Institution *</label>
            <input type="text" id="school" placeholder="Your school name" required/>
          </div>
        </div>
        <div class="form-group">
          <label>Subjects Interested In *</label>
          <div class="checkbox-grid" id="subjectCheckboxes">
            <label class="checkbox-item"><input type="checkbox" value="Mathematics"/> Mathematics</label>
            <label class="checkbox-item"><input type="checkbox" value="Science"/> Science</label>
            <label class="checkbox-item"><input type="checkbox" value="Physics"/> Physics</label>
            <label class="checkbox-item"><input type="checkbox" value="Chemistry"/> Chemistry</label>
            <label class="checkbox-item"><input type="checkbox" value="Biology"/> Biology</label>
            <label class="checkbox-item"><input type="checkbox" value="English"/> English</label>
            <label class="checkbox-item"><input type="checkbox" value="Social Studies"/> Social Studies</label>
            <label class="checkbox-item"><input type="checkbox" value="Accountancy"/> Accountancy</label>
            <label class="checkbox-item"><input type="checkbox" value="Economics"/> Economics</label>
            <label class="checkbox-item"><input type="checkbox" value="Computer Science"/> Computer Science</label>
          </div>
        </div>
        <div class="form-group">
          <label>Preferred Batch</label>
          <select id="batch">
            <option value="">Select Batch</option>
            <option>Morning (7AM – 10AM)</option>
            <option>Evening (4PM – 8PM)</option>
            <option>Both</option>
          </select>
        </div>
        <div style="display:flex;gap:12px;">
          <button type="button" class="btn-secondary btn-full" onclick="prevStep(1)"><i class="fas fa-arrow-left"></i> Back</button>
          <button type="button" class="btn-primary btn-full" onclick="nextStep(3)">Next <i class="fas fa-arrow-right"></i></button>
        </div>
      </div>

      <!-- STEP 3 -->
      <div class="reg-step-content" id="step3">
        <div class="form-row">
          <div class="form-group">
            <label>Student Phone *</label>
            <input type="tel" id="phone" placeholder="10-digit number" required/>
          </div>
          <div class="form-group">
            <label>Parent/Guardian Phone *</label>
            <input type="tel" id="parentPhone" placeholder="10-digit number" required/>
          </div>
        </div>
        <div class="form-group">
          <label>Address</label>
          <input type="text" id="address" placeholder="Village / Mohalla, Town"/>
        </div>
        <div class="form-group">
          <label>Create Password *</label>
          <input type="password" id="password" placeholder="Min 6 characters" required/>
        </div>
        <div class="form-group">
          <label>Confirm Password *</label>
          <input type="password" id="confirmPassword" placeholder="Repeat password" required/>
        </div>
        <div class="form-group">
          <label>How did you hear about us?</label>
          <select id="referral">
            <option value="">Select</option>
            <option>Friend / Classmate</option>
            <option>Parents</option>
            <option>Social Media</option>
            <option>Noticed the Centre</option>
            <option>Other</option>
          </select>
        </div>
        <div style="display:flex;gap:12px;">
          <button type="button" class="btn-secondary btn-full" onclick="prevStep(2)"><i class="fas fa-arrow-left"></i> Back</button>
          <button type="submit" class="btn-primary btn-full"><i class="fas fa-check"></i> Submit Registration</button>
        </div>
      </div>
    </form>

    <div class="form-link">Already have an account? <a href="student-login.html">Login here</a></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<style>
.reg-steps {
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 32px; gap: 0;
}
.step {
  display: flex; align-items: center; gap: 8px;
  font-size: 13px; font-weight: 600; color: var(--text-light);
  transition: all 0.3s;
}
.step span {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--border); color: var(--text-light);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700; transition: all 0.3s;
}
.step.active { color: var(--primary); }
.step.active span { background: var(--primary); color: #fff; }
.step.done span { background: var(--accent2); color: #fff; }
.step-line { flex: 1; height: 2px; background: var(--border); margin: 0 8px; min-width: 40px; }

.reg-step-content { display: none; }
.reg-step-content.active { display: block; animation: slideUp 0.4s ease both; }

.checkbox-grid {
  display: grid; grid-template-columns: repeat(2, 1fr);
  gap: 10px; margin-top: 8px;
}
.checkbox-item {
  display: flex; align-items: center; gap: 8px;
  font-size: 14px; cursor: pointer;
  padding: 10px 14px; border: 1.5px solid var(--border); border-radius: 8px;
  transition: all 0.2s; background: var(--bg);
}
.checkbox-item:hover { border-color: var(--primary); background: rgba(26,58,92,0.04); }
.checkbox-item input[type="checkbox"]:checked + * { color: var(--primary); }
.checkbox-item input { accent-color: var(--primary); }
</style>

<script src="js/main.js"></script>
<script>
let currentStep = 1;

function nextStep(step) {
  if (!validateStep(currentStep)) return;
  document.getElementById('step' + currentStep).classList.remove('active');
  document.querySelectorAll('.step')[currentStep - 1].classList.add('done');
  document.querySelectorAll('.step')[currentStep - 1].classList.remove('active');
  currentStep = step;
  document.getElementById('step' + currentStep).classList.add('active');
  document.querySelectorAll('.step')[currentStep - 1].classList.add('active');
}

function prevStep(step) {
  document.getElementById('step' + currentStep).classList.remove('active');
  currentStep = step;
  document.getElementById('step' + currentStep).classList.add('active');
  document.querySelectorAll('.step')[currentStep].classList.remove('active', 'done');
}

function validateStep(step) {
  if (step === 1) {
    if (!document.getElementById('fullName').value.trim()) { showToast('Please enter full name', 'error'); return false; }
    if (!document.getElementById('dob').value) { showToast('Please select date of birth', 'error'); return false; }
    if (!document.getElementById('gender').value) { showToast('Please select gender', 'error'); return false; }
    if (!document.getElementById('fatherName').value.trim()) { showToast("Please enter father's name", 'error'); return false; }
  }
  if (step === 2) {
    if (!document.getElementById('studentClass').value) { showToast('Please select class', 'error'); return false; }
    if (!document.getElementById('school').value.trim()) { showToast('Please enter school name', 'error'); return false; }
  }
  return true;
}

document.getElementById('registerForm').addEventListener('submit', (e) => {
  e.preventDefault();
  const pwd = document.getElementById('password').value;
  const cpwd = document.getElementById('confirmPassword').value;
  if (pwd.length < 6) { showToast('Password must be at least 6 characters', 'error'); return; }
  if (pwd !== cpwd) { showToast('Passwords do not match', 'error'); return; }

  const phone = document.getElementById('phone').value;
  if (!/^\d{10}$/.test(phone)) { showToast('Enter valid 10-digit phone number', 'error'); return; }

  // Get selected subjects
  const subjects = [...document.querySelectorAll('#subjectCheckboxes input:checked')].map(cb => cb.value);

  // Build student object
  const student = {
    id: 'MSS' + Date.now(),
    fullName: document.getElementById('fullName').value.trim(),
    dob: document.getElementById('dob').value,
    gender: document.getElementById('gender').value,
    fatherName: document.getElementById('fatherName').value.trim(),
    motherName: document.getElementById('motherName').value.trim(),
    studentClass: document.getElementById('studentClass').value,
    school: document.getElementById('school').value.trim(),
    subjects: subjects,
    batch: document.getElementById('batch').value,
    phone: phone,
    parentPhone: document.getElementById('parentPhone').value,
    address: document.getElementById('address').value.trim(),
    password: btoa(pwd), // basic encoding (not secure, for demo only)
    referral: document.getElementById('referral').value,
    joinDate: new Date().toISOString().split('T')[0],
    feeStatus: 'Pending',
    feePaid: 0,
    feeHistory: [],
    status: 'Active'
  };

  // Save to localStorage
  const students = JSON.parse(localStorage.getItem('mss_students') || '[]');
  const exists = students.find(s => s.phone === phone);
  if (exists) { showToast('A student with this phone number already exists.', 'error'); return; }
  students.push(student);
  localStorage.setItem('mss_students', JSON.stringify(students));

  showToast('🎉 Registration Successful! Your ID: ' + student.id);
  setTimeout(() => { window.location.href = 'student-login.html'; }, 2500);
});
</script>
</body>
</html>
