<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — Mir's Study Space</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config-prod.js"></script>
</head>
<body>

<nav class="navbar scrolled" id="navbar">
  <div class="nav-container">
    <a href="index.html" class="nav-logo">
      <div class="logo-icon">M</div>
      <div>
        <span class="logo-title">Mir's Study Space</span>
        <span class="logo-sub">Centre of Excellence</span>
      </div>
    </a>
    <ul class="nav-links" id="navLinks">
      <li><a href="index.html">← Back to Home</a></li>
      <li><a href="student-login.html" class="nav-login"><i class="fas fa-user"></i> Student Login</a></li>
    </ul>
    <button class="hamburger" id="hamburger"><i class="fas fa-bars"></i></button>
  </div>
</nav>

<div class="form-page" style="background: linear-gradient(135deg, #f5f3ee 0%, #e8f4f8 100%);">
  <div class="form-card">
    <div class="form-logo">
      <div class="logo-icon">M</div>
      <h1>Student Registration</h1>
      <p>Join Mir's Study Space — Sangam's Centre of Excellence</p>
    </div>

    <!-- PROGRESS STEPS -->
    <div class="reg-steps" id="regSteps">
      <div class="step active" data-step="1"><span>1</span> Personal Info</div>
      <div class="step-line"></div>
      <div class="step" data-step="2"><span>2</span> Study Details</div>
    </div>

    <form id="registerForm">
      <!-- STEP 1 -->
      <div class="reg-step-content active" id="step1">
        <div class="form-group">
          <label>Full Name *</label>
          <input type="text" id="fullName" placeholder="Enter your full name" required/>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Email *</label>
            <input type="email" id="email" placeholder="Enter your email" required/>
          </div>
          <div class="form-group">
            <label>Phone *</label>
            <input type="tel" id="phone" placeholder="10-digit number" required/>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Date of Birth *</label>
            <input type="date" id="dob" required/>
          </div>
          <div class="form-group">
            <label>Aadhar Number *</label>
            <input type="text" id="aadhar" placeholder="Enter Aadhar number" required/>
          </div>
        </div>
        <div class="form-group">
          <label>Address *</label>
          <input type="text" id="address" placeholder="Village / Mohalla, Town" required/>
        </div>
        <button type="button" class="btn-primary btn-full" onclick="nextStep(2)">
          Next <i class="fas fa-arrow-right"></i>
        </button>
      </div>

      <!-- STEP 2 -->
      <div class="reg-step-content" id="step2">
        <div class="form-group">
          <label>Class / Course *</label>
          <select id="studentClass" required>
            <option value="">Select</option>
            <option>Neet</option>
            <option>SSB</option>
            <option>UPSC</option>
            <option>Board exams</option>
            <option>Others</option>
          </select>
        </div>
        <div class="form-group">
          <label>Purpose of Study *</label>
          <input type="text" id="purpose" placeholder="e.g. Neet coaching" required/>
        </div>
        <div class="form-group">
          <label>Fee Pending (₹) *</label>
          <input type="number" id="feePending" placeholder="Enter pending fee amount" min="0" required/>
        </div>
        <div class="form-group">
          <label>Join Date *</label>
          <input type="date" id="joinDate" required/>
        </div>
        <div style="display:flex;gap:12px;">
          <button type="button" class="btn-secondary btn-full" onclick="prevStep(1)">
            <i class="fas fa-arrow-left"></i> Back
          </button>
          <button type="submit" class="btn-primary btn-full" id="submitBtn">
            <i class="fas fa-check"></i> Submit Registration
          </button>
        </div>
      </div>
    </form>

    <div class="form-link">Already have an account? <a href="student-login.html">Login here</a></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="js/main.js"></script>
<script>
let currentStep = 1;

function nextStep(step) {
  if (!validateStep(currentStep)) return;
  document.getElementById('step' + currentStep).classList.remove('active');
  document.querySelectorAll('.step')[currentStep - 1].classList.add('done');
  document.querySelectorAll('.step')[currentStep - 1].classList.remove('active');
  currentStep = step;
  document.getElementById('step' + currentStep).classList.add('active');
  document.querySelectorAll('.step')[currentStep - 1].classList.add('active');
}

function prevStep(step) {
  document.getElementById('step' + currentStep).classList.remove('active');
  document.querySelectorAll('.step')[currentStep - 1].classList.remove('active', 'done');
  currentStep = step;
  document.getElementById('step' + currentStep).classList.add('active');
  document.querySelectorAll('.step')[currentStep - 1].classList.add('active');
}

function validateStep(step) {
  if (step === 1) {
    if (!document.getElementById('fullName').value.trim()) { showToast('Please enter full name', 'error'); return false; }
    if (!document.getElementById('email').value.trim()) { showToast('Please enter an email', 'error'); return false; }
    if (!document.getElementById('phone').value.trim()) { showToast('Please enter phone number', 'error'); return false; }
    if (!/^[0-9]{10}$/.test(document.getElementById('phone').value.trim())) { showToast('Enter valid 10-digit phone number', 'error'); return false; }
    if (!document.getElementById('dob').value) { showToast('Please select date of birth', 'error'); return false; }
    if (!document.getElementById('aadhar').value.trim()) { showToast('Please enter Aadhar number', 'error'); return false; }
    if (!document.getElementById('address').value.trim()) { showToast('Please enter address', 'error'); return false; }
  }
  return true;
}

document.getElementById('registerForm').addEventListener('submit', async (e) => {
  e.preventDefault();

  const phone = document.getElementById('phone').value.trim();
  const email = document.getElementById('email').value.trim().toLowerCase();
  const dob = document.getElementById('dob').value;

  if (!document.getElementById('studentClass').value) { showToast('Please select class', 'error'); return; }
  if (!document.getElementById('purpose').value.trim()) { showToast('Please enter purpose of study', 'error'); return; }
  if (!document.getElementById('feePending').value) { showToast('Please enter fee pending', 'error'); return; }
  if (!document.getElementById('joinDate').value) { showToast('Please select join date', 'error'); return; }

  const submitBtn = document.getElementById('submitBtn');
  submitBtn.disabled = true;
  submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Registering...';

  try {
    // Check for duplicate phone
    const phoneCheck = await db.collection('students').where('phone', '==', phone).get();
    if (!phoneCheck.empty) {
      showToast('A student with this phone number already exists.', 'error');
      submitBtn.disabled = false;
      submitBtn.innerHTML = '<i class="fas fa-check"></i> Submit Registration';
      return;
    }

    // Check for duplicate email
    const emailCheck = await db.collection('students').where('email', '==', email).get();
    if (!emailCheck.empty) {
      showToast('A student with this email already exists.', 'error');
      submitBtn.disabled = false;
      submitBtn.innerHTML = '<i class="fas fa-check"></i> Submit Registration';
      return;
    }

    const feePending = parseFloat(document.getElementById('feePending').value) || 0;
    const studentId = 'MSS' + Date.now();

    const student = {
      id: studentId,
      fullName: document.getElementById('fullName').value.trim(),
      email: email,
      phone: phone,
      dob: dob,
      aadharNumber: document.getElementById('aadhar').value.trim(),
      address: document.getElementById('address').value.trim(),
      studentClass: document.getElementById('studentClass').value,
      purpose: document.getElementById('purpose').value.trim(),
      feePending: feePending,
      totalFee: feePending,
      joinDate: document.getElementById('joinDate').value,
      password: dob,           // DOB as password
      feeStatus: 'Pending',
      feeHistory: [],
      subjects: [],
      status: 'Active',
      createdAt: new Date().toISOString()
    };

    // Save to Firestore using studentId as document ID
    await db.collection('students').doc(studentId).set(student);

    showToast('🎉 Registration Successful! Your ID: ' + studentId);
    setTimeout(() => { window.location.href = 'student-login.html'; }, 2500);

  } catch (err) {
    console.error('Registration error:', err);
    showToast('❌ Registration failed. Please try again.', 'error');
    submitBtn.disabled = false;
    submitBtn.innerHTML = '<i class="fas fa-check"></i> Submit Registration';
  }
});

// Pre-fill today's date for join date
document.getElementById('joinDate').value = new Date().toISOString().split('T')[0];
</script>
</body>
</html>
