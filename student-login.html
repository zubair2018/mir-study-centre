<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Login — Mir's Study Space</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config-prod.js"></script>
</head>
<body style="background:linear-gradient(135deg,#0f2040 0%,#1a3a5c 100%);min-height:100vh;">

<nav class="navbar scrolled" style="background:rgba(255,255,255,0.05);backdrop-filter:blur(12px);">
  <div class="nav-container">
    <a href="index.html" class="nav-logo">
      <div class="logo-icon">M</div>
      <div>
        <span class="logo-title" style="color:#fff;">Mir's Study Space</span>
        <span class="logo-sub" style="color:rgba(255,255,255,0.5);">Student Portal</span>
      </div>
    </a>
    <ul class="nav-links">
      <li><a href="index.html" style="color:rgba(255,255,255,0.7);">← Home</a></li>
    </ul>
  </div>
</nav>

<div class="form-page" style="background:transparent;">
  <div class="form-card form-card-sm">
    <div class="form-logo">
      <div class="logo-icon" style="background:linear-gradient(135deg,#e8a020,#f4c842);">
        <i class="fas fa-user" style="font-size:22px;color:#1a3a5c;"></i>
      </div>
      <h1>Student Login</h1>
      <p>Login with your registered email and date of birth</p>
    </div>

    <form id="studentLoginForm">
      <div class="form-group">
        <label><i class="fas fa-envelope" style="color:var(--accent);margin-right:6px;"></i> Registered Email</label>
        <input type="email" id="studentEmail" placeholder="Enter your registered email" required autocomplete="email"/>
      </div>
      <div class="form-group">
        <label><i class="fas fa-lock" style="color:var(--accent);margin-right:6px;"></i> Password</label>
        <div style="position:relative;">
          <input type="password" id="studentPwd" placeholder="Your date of birth: YYYY-MM-DD" required style="padding-right:48px;" autocomplete="current-password"/>
          <button type="button" onclick="togglePwd()" style="position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-light);cursor:pointer;font-size:16px;">
            <i class="fas fa-eye" id="eyeIcon"></i>
          </button>
        </div>
        <div style="font-size:12px;color:var(--text-light);margin-top:6px;">
          <i class="fas fa-info-circle"></i> Your password is your date of birth in YYYY-MM-DD format (e.g. 2005-03-14)
        </div>
      </div>

      <button type="submit" class="btn-primary btn-full" id="loginBtn" style="margin-top:8px;">
        <i class="fas fa-sign-in-alt"></i> Login
      </button>
    </form>

    <hr class="form-divider"/>
    <div class="form-link">
      Don't have an account? <a href="register.html">Register here</a>
    </div>
    <div class="form-link" style="margin-top:10px;">
      <a href="admin-login.html" style="color:var(--accent2);">
        <i class="fas fa-user-shield"></i> Admin Login
      </a>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="js/main.js"></script>
<script>
function togglePwd() {
  const inp = document.getElementById('studentPwd');
  const icon = document.getElementById('eyeIcon');
  inp.type = inp.type === 'password' ? 'text' : 'password';
  icon.className = inp.type === 'password' ? 'fas fa-eye' : 'fas fa-eye-slash';
}

document.getElementById('studentLoginForm').addEventListener('submit', async e => {
  e.preventDefault();
  const email = document.getElementById('studentEmail').value.trim().toLowerCase();
  const pwd = document.getElementById('studentPwd').value.trim();

  if (!email || !pwd) {
    showToast('❌ Please enter both email and password.', 'error');
    return;
  }

  const loginBtn = document.getElementById('loginBtn');
  loginBtn.disabled = true;
  loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';

  try {
    const snapshot = await db.collection('students').where('email', '==', email).get();

    if (snapshot.empty) {
      showToast('❌ No account found with this email.', 'error');
      loginBtn.disabled = false;
      loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
      return;
    }

    const student = snapshot.docs[0].data();

    if (student.password !== pwd) {
      showToast('❌ Incorrect password. Use your date of birth (YYYY-MM-DD).', 'error');
      loginBtn.disabled = false;
      loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
      return;
    }

    localStorage.setItem('mss_current_student', student.phone);
    showToast('✅ Login successful! Redirecting...');
    setTimeout(() => { window.location.href = 'student-portal.html'; }, 900);

  } catch (err) {
    console.error('Login error:', err);
    showToast('❌ Login failed. Please check your connection.', 'error');
    loginBtn.disabled = false;
    loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
  }
});
</script>
</body>
</html>
